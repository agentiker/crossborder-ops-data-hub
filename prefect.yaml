# ⚠️ 当前生产**不用** Prefect server/worker 调度。
# 实际调度走 systemd user timer：deploy/systemd/ + deploy/deploy.sh（见 docs/proactive-push-ops.md）。
# 本文件仅：① 描述各 flow 的预期周期（文档性）；② 未来若迁 Prefect 时复用。
# `prefect deploy --all` 不是当前生产路径——别照它上线，会空转（没有 worker 在跑）。
#
# Prefect 部署配置文件
# 使用方式（仅当未来真上 Prefect 时）: prefect deploy --all

deployments:
  - name: tiktok-inventory-sync
    entrypoint: flows/sync_inventory.py:sync_inventory_flow
    schedule:
      interval: 3600  # 每小时

  - name: tiktok-order-sync
    entrypoint: flows/sync_orders.py:sync_orders_flow
    schedule:
      interval: 3600  # 每小时

  - name: tiktok-fulfillment-sync
    entrypoint: flows/sync_fulfillments.py:sync_fulfillments_flow
    schedule:
      interval: 900  # 每 15 分钟（发货预警类，比库存/订单更密）

  - name: refresh-tiktok-tokens
    entrypoint: flows/refresh_tokens.py:refresh_tokens_flow
    schedule:
      interval: 21600  # 每 6 小时

  - name: scan-fulfillment-alerts
    entrypoint: flows/scan_fulfillment_alerts.py:scan_fulfillment_alerts_flow
    schedule:
      interval: 1800  # 每 30 分钟巡检待发货超时（夜间静默由 flow 内判断跳过）
