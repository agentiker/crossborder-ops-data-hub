# ⚠️ DEPRECATED —— 生产不用 nginx。公网入口全部由 cloudflared 命名隧道承担
# （出站连 Cloudflare、源站不开任何入站端口，无证书运维）。见 docs/production-deployment.md §6.3
# 与 deploy/cloudflared/config.prod.yml。本文件仅作早期 OAuth 反代方案的参考，保留不维护。
#
# Crossborder Ops Data Hub —— nginx 反向代理配置（已弃用）
#
# 作用：只把 TTS OAuth 回调这一条路径从公网转发到本机 app（127.0.0.1:8000）。
# 数据接口 /api/data/* 不在此暴露，外网无法访问，只能由本机 openclaw skill 调用。
#
# 部署：
#   1. 把本文件放到 /etc/nginx/conf.d/data-hub.conf（或 sites-available 并软链）
#   2. 用 certbot 申请证书： sudo certbot --nginx -d your-domain.com
#   3. 把 your-domain.com 换成你的真实域名
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. 在 TTS 开发者后台登记回调： https://your-domain.com/auth/callback/tiktok

server {
    listen 80;
    server_name your-domain.com;

    # 强制跳转 https（TTS 回调要求 https）
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # certbot 会自动填好以下证书路径
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # —— 只放行 OAuth 回调，其余路径一律 404 —— #
    # 精确匹配回调端点（含可选的 /html 变体）
    location = /auth/callback/tiktok {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/callback/tiktok/html {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其余所有路径（包括 /api/data/*）一律拒绝，确保数据接口不出公网
    location / {
        return 404;
    }
}
