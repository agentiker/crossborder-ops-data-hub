# Cloudflare 命名隧道配置 —— 生产环境（单租户 gtl）。
# 把生产机的 data-hub（127.0.0.1:8000）暴露成 https://gtl.agenticker.cc。
#
# 与同目录 hp 的 config.yml 的区别（务必看清，别照抄 hp 那份）：
#   1. 单租户：只服务 gtl.agenticker.cc 一个 hostname（hp 是 board + gtl 双 host）。
#   2. 新增 TikTok OAuth 回调路由（hp 没有——hp 当初用本地 CLI 授权，不走公网回调；
#      生产商家点授权链接 → TikTok 带 auth_code 回调到此，必须放行）。
#   3. 独立隧道：生产机自己 `cloudflared tunnel create` 生成**新 UUID + 新隧道名**，
#      勿复用 hp 的 board 隧道（隧道名在同一 Cloudflare 账号内唯一，board 已被 hp 占）。
#
# ── 生产机部署步骤（部署用户身份，非 sudo）──
#   cloudflared tunnel login                              # 浏览器授权 agenticker.cc zone
#   cloudflared tunnel create gtl-prod                    # 生成隧道 + 凭据 json，记下 UUID
#   # 填好下面 tunnel 名 / credentials-file 的真实 UUID 后，把本文件作为【该机的活配置】放到约定路径：
#   cp deploy/cloudflared/config.prod.yml ~/.cloudflared/config.yml
#   ./deploy/deploy.sh --restart-tunnel                   # 装单元 + 启动隧道
#   cloudflared tunnel route dns gtl-prod gtl.agenticker.cc
#     ↑ 写/覆盖 gtl.agenticker.cc 的 CNAME 指向本隧道 = 把域名从 hp 的 board 隧道「搬」过来
#       （CNAME 同一时刻只指一条）。切换后去 hp 删 gtl 三条 ingress、重启 hp 隧道（hp 仅留 board）。
#
# 单元已去耦合（2026-06）：cloudflared-board.service 读【各机自己的】 ~/.cloudflared/config.yml、
#   `run` 无位置参数从配置 tunnel: 取隧道名。故本文件是【模板】——填好后 cp 到 ~/.cloudflared/config.yml
#   才是活配置；deploy.sh 重装单元不动它。hp 同理：其 config.yml 放到 hp 的 ~/.cloudflared/config.yml。
#
# Cloudflare SSL 模式设 Full（勿 Full strict，源站无证书）。

tunnel: gtl-prod
credentials-file: /home/<部署用户>/.cloudflared/<生产隧道UUID>.json

# 协议：hp 因其出口挡了 argotunnel TCP 7844、仅 QUIC(UDP) 可达，被迫强制 quic。
# 全新阿里云 ECS 一般 TCP/UDP 7844 都通，留默认 auto（先 QUIC、失败回退 TCP）即可。
# 若生产机隧道也连不上、日志反复重试 TCP，再取消下面三行注释强制 quic：
# protocol: quic
# retries: 5
# grace-period: 30s

ingress:
  # 看板 + Web 对话 SPA + 经营报告。飞书登录回调 /board/auth/feishu/callback 以 /board 开头，
  # 已被本条覆盖（飞书 app 后台 redirect_uri 白名单需含 https://gtl.agenticker.cc/board/auth/feishu/callback）。
  - hostname: gtl.agenticker.cc
    path: "^/(board|app|report)($|/)"
    service: http://127.0.0.1:8000

  # Web 对话端 API：me/chat/conversations + admin（boss-only 守卫）；均经飞书登录 cookie 鉴权。
  # /api/data 内部端点**不在此列**，公网不可达（openclaw 走本机 127.0.0.1 直连）。
  - hostname: gtl.agenticker.cc
    path: "^/api/(me|chat|conversations|admin)($|/)"
    service: http://127.0.0.1:8000

  # TikTok Shop OAuth 回调（生产新增，最易漏）：商家点授权链接 → TikTok 带 auth_code 重定向到此。
  # ($|/) 同时覆盖 /auth/callback/tiktok 和 /auth/callback/tiktok/html。
  # Partner Center 回调地址登记：https://gtl.agenticker.cc/auth/callback/tiktok
  - hostname: gtl.agenticker.cc
    path: "^/auth/callback/tiktok($|/)"
    service: http://127.0.0.1:8000

  # 同 hostname 其余路径 → 404（挡 swagger / 内部端点 / /api/data / /auth 下其它路径）。
  - hostname: gtl.agenticker.cc
    service: http_status:404

  # 兜底：其余 hostname 一律 404，避免隧道沦为开放反代。必须是最后一条（cloudflared 强制）。
  - service: http_status:404
