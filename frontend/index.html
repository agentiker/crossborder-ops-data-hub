<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- iOS Safari 顶部地址栏染成页面底色,与页面融为一体。值=精确换算 --background hsl(58 20% 96%) -->
    <meta name="theme-color" content="#f7f7f3" />
    <title>跨境运营数据中枢</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- iOS 26 Safari 底部工具栏采样诱饵（样式见 index.css #ios-toolbar-tint）。放在 #root 外、
         不入 React 树，路由切换不影响，常驻供 Safari 采样底部边缘色。 -->
    <div id="ios-toolbar-tint" aria-hidden="true"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
